# Group 6 — PEFT sanity (QLoRA-style 4-bit + LoRA). Requires ``uv sync --extra quant`` / bitsandbytes + GPU.

task_type: "SEQ_CLS"
peft_type: "lora"
r: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules:
  - "k_proj"
  - "v_proj"

quantization: "4bit"
output_dir: "outputs/runs/tinyllama_qlora"
learning_rate: 0.0002
num_train_epochs: 1
weight_decay: 0.01
logging_dir: "outputs/logs/tinyllama_qlora"
logging_steps: 50
metric_for_best_model: "f1"
seed: 123
model_checkpoint: "PY007/TinyLlama-1.1B-step-50K-105b"
model_name: "TinyLlama-QLoRA"

per_device_train_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 8
fp16: false
save_total_limit: 2
