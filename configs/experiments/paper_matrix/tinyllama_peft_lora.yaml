# Group 6 — standard LoRA (no quant), hyperparameters aligned with ``tinyllama_qlora`` / ``tinyllama_dora``
# for a controlled PEFT comparison. Writes to ``outputs/runs/tinyllama_peft_lora/<dataset>/``.

task_type: "SEQ_CLS"
peft_type: "lora"
r: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules:
  - "k_proj"
  - "v_proj"

quantization: "none"
output_dir: "outputs/runs/tinyllama_peft_lora"
learning_rate: 0.0002
num_train_epochs: 1
weight_decay: 0.01
logging_dir: "outputs/logs/tinyllama_peft_lora"
logging_steps: 50
metric_for_best_model: "f1"
seed: 123
model_checkpoint: "PY007/TinyLlama-1.1B-step-50K-105b"
model_name: "TinyLlama-PEFT-LoRA"

per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 4
fp16: true
save_total_limit: 2
