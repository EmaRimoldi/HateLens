# Group 3 — rationale ablation (no rationale supervision)
# Output: outputs/runs/tinyllama/structured_dynahate_no_rationale/best_checkpoint

training_mode: "structured"
structured_output_suffix: "_no_rationale"
task_type: "FEATURE_EXTRACTION"
peft_type: "lora"
r: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules:
  - "k_proj"
  - "v_proj"

quantization: "none"
max_length: 512
use_rationale: false
use_consistency: false
aux_loss_weight: 0.5
rationale_loss_weight: 0.3
consistency_loss_weight: 0.2

output_dir: "outputs/runs/tinyllama"
learning_rate: 0.0002
num_train_epochs: 2
weight_decay: 0.01
logging_dir: "outputs/logs/tinyllama"
logging_steps: 50
metric_for_best_model: "f1_macro"
seed: 123
model_checkpoint: "PY007/TinyLlama-1.1B-step-50K-105b"
model_name: "TinyLlama"

per_device_train_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 4
fp16: true
save_total_limit: 2
