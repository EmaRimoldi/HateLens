# Unified evaluation runner (``hatelens eval-run --config configs/eval/minimal.yaml``).
# Paths are relative to the repository root unless absolute.

checkpoint: "outputs/runs/tinyllama/dynahate/best_checkpoint"
run_name: "tinyllama_dynahate_smoke"
mode: "auto"

in_domain:
  - "dynahate"
  - "hateeval"

cross_dataset:
  - { train: "dynahate", test: "hateeval" }
  - { train: "hateeval", test: "dynahate" }

hatecheck: true

rationale:
  enabled: false
  dataset: "hatexplain"
  split: "test"
  max_samples: 64

calibration: true
efficiency: true

max_samples: null
split: "test"
batch_size: 8
merge_binary_adapters: true
quantization: "none"
# output_root: "outputs/eval_runs"
